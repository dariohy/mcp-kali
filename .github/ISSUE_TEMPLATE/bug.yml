name: Bug report
description: Report a reproducible problem using synthetic, non-sensitive data.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not include credentials, real targets, customer data, pentest evidence, or undisclosed vulnerabilities. Use a private security advisory for security reports.
  - type: input
    id: version
    attributes:
      label: Version
      description: Output from the affected binary's --version option.
      placeholder: mcp-kali-server 1.1.0
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Server
        - Client
        - Dashboard
        - Job scheduler
        - Documentation or packaging
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Use localhost, example.test, and synthetic values only.
      render: shell
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, Rust version if built locally, and relevant non-secret configuration.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I removed credentials, real targets, customer data, and pentest evidence.
          required: true
        - label: This is not an undisclosed security vulnerability.
          required: true
